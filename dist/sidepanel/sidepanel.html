<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanIn</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="" class="logo" />
    <h1>CleanIn</h1>
  </header>

  <main>
    <section class="filter-group">
      <h2>Main Content</h2>

      <label class="toggle-row" for="toggle-suggested">
        <span class="toggle-label">
          <span class="toggle-title">Hide Suggested</span>
          <span class="toggle-description">Removes posts LinkedIn recommends based on your activity</span>
        </span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-suggested" />
          <span class="slider"></span>
        </div>
      </label>

      <label class="toggle-row" for="toggle-promoted">
        <span class="toggle-label">
          <span class="toggle-title">Hide Promoted</span>
          <span class="toggle-description">Removes sponsored ads and promoted content</span>
        </span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-promoted" />
          <span class="slider"></span>
        </div>
      </label>
    </section>

    <section class="filter-group">
      <h2>Sidebar</h2>

      <label class="toggle-row" for="toggle-linkedin-news">
        <span class="toggle-label">
          <span class="toggle-title">Hide LinkedIn News</span>
          <span class="toggle-description">Removes the LinkedIn News top stories panel</span>
        </span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-linkedin-news" />
          <span class="slider"></span>
        </div>
      </label>

      <label class="toggle-row" for="toggle-puzzles">
        <span class="toggle-label">
          <span class="toggle-title">Hide Puzzles</span>
          <span class="toggle-description">Removes the Today's puzzles panel</span>
        </span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-puzzles" />
          <span class="slider"></span>
        </div>
      </label>
    </section>
    <section class="filter-group">
      <h2>Display Mode</h2>

      <div class="chip-row" role="radiogroup" aria-label="Filtered post display mode">
        <button type="button" class="chip" role="radio" data-mode="transparent" aria-checked="true">Transparent</button>
        <button type="button" class="chip" role="radio" data-mode="hidden" aria-checked="false">Hidden</button>
      </div>
      <p class="chip-description">Transparent shows filtered posts dimmed for debugging. Hidden removes them entirely.</p>
    </section>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
